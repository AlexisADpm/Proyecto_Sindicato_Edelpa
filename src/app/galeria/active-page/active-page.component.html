<section class="py-20 px-6 md:px-25 text-center min-h-screen">
  <div class="mb-12 flex flex-col md:flex-row items-center justify-between gap-4">
    <h2 class="text-edelpa-primary text-4xl font-extrabold uppercase">{{ sectionName() }}</h2>
    <a routerLink="/galeria" class="text-edelpa-accent font-bold hover:underline flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"
        class="size-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
      </svg>
      Volver a Galería
    </a>
  </div>

  <div id="gallery-active-page"
    class="pswp-gallery grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
    @for (imagen of imagenes(); track imagen.id) {
    <div class="group relative aspect-square overflow-hidden rounded-2xl shadow-md bg-gray-100">
      <a [href]="imagen.url" data-pswp-width="1200" data-pswp-height="800" target="_blank" class="block h-full w-full">
        <img [src]="imagen.url" [alt]="imagen.nombre" (load)="onImageLoad($event)"
          class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-110">

        <div
          class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
          <div
            class="bg-white p-3 rounded-full shadow-lg transform translate-y-4 group-hover:translate-y-0 transition-transform duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5"
              stroke="currentColor" class="size-6 text-edelpa-primary">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607ZM10.5 7.5v6m3-3h-6" />
            </svg>
          </div>
        </div>
      </a>
    </div>
    } @empty {
    @if (!cargando()) {
    <p class="col-span-full py-20 text-gray-500 text-xl italic">No hay fotos en esta sección por el momento.</p>
    }
    }
  </div>

  <!-- Loading State -->
  @if (cargando()) {
  <div class="flex flex-col items-center justify-center py-12 gap-3">
    <div class="animate-spin rounded-full h-10 w-10 border-4 border-edelpa-primary border-t-transparent"></div>
    <p class="text-edelpa-primary font-semibold animate-pulse">Cargando más imágenes...</p>
  </div>
  }

  <!-- End of Content -->
  @if (!hayMas() && imagenes().length > 0) {
  <p class="py-12 text-gray-400 font-medium">Has llegado al final de la galería.</p>
  }
</section>
